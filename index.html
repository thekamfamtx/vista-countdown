<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carnival Vista Countdown</title>

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.ticker{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;
    height:180px;

    display:flex;
    align-items:center;

    background:rgba(0,0,0,.90);

    border-top:5px solid #ff7b00;

    box-shadow:
        0 0 15px #ff7b00,
        0 0 30px #9c27b0;
}

.image-area{
    width:240px;
    text-align:center;
}

.image-area img{
    max-width:220px;
    max-height:160px;
}

.info-area{
    flex:1;
}

.title{
    text-align:center;

    font-size:44px;
    font-weight:900;

    color:#ff7b00;

    text-shadow:
        0 0 10px #ff7b00,
        0 0 20px #9c27b0,
        0 0 30px #9c27b0;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:10px;
}

.box{
    min-width:140px;

    background:#111;

    border:3px solid #9c27b0;

    border-radius:15px;

    padding:8px;

    text-align:center;

    box-shadow:
        0 0 10px #9c27b0;
}

.box span{
    display:block;

    font-size:58px;
    font-weight:bold;
}

.box small{
    color:white;
    font-size:16px;
}

#days{
    color:#ff7b00;
}

#hours{
    color:#ffb347;
}

#minutes{
    color:#d17cff;
}

#seconds{
    color:#ffffff;
}

.footer{
    margin-top:10px;

    text-align:center;

    color:white;

    font-size:24px;
}

.pumpkin{
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="ticker">

    <div class="image-area">
        <img src="vista-logo.png">
    </div>

    <div class="info-area">

        <div class="title">
            🎃 CARNIVAL VISTA COUNTDOWN 🎃
        </div>

        <div class="countdown">

            <div class="box">
                <span id="days">0</span>
                <small>DAYS</small>
            </div>

            <div class="box">
                <span id="hours">0</span>
                <small>HOURS</small>
            </div>

            <div class="box">
                <span id="minutes">0</span>
                <small>MINUTES</small>
            </div>

            <div class="box">
                <span id="seconds">0</span>
                <small>SECONDS</small>
            </div>

        </div>

        <div class="footer">
            🎃 Halloween Cruise Adventure • Carnival Vista • October 11, 2026 🎃
        </div>

    </div>

</div>

<script>

const cruiseDate =
new Date("2026-10-11T11:00:00");

function updateCountdown(){

    const now = new Date();

    const diff = cruiseDate - now;

    if(diff <= 0){

        document.querySelector('.countdown').innerHTML =
        '<div style="font-size:60px;color:#ff7b00;">🚢 BON VOYAGE! 🚢</div>';

        return;
    }

    const days =
        Math.floor(diff/(1000*60*60*24));

    const hours =
        Math.floor((diff%(1000*60*60*24))
        /(1000*60*60));

    const minutes =
        Math.floor((diff%(1000*60*60))
        /(1000*60));

    const seconds =
        Math.floor((diff%(1000*60))/1000);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
