<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnival Vista Countdown</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:transparent;
}

/* SAME SIZE AS GOBBLE */
#countdown-box {
  position:fixed;
  top:30px;
  right:30px;

  width:520px;
  padding:28px;

  text-align:center;
  color:white;

  background:linear-gradient(
    135deg,
    #1a001f,
    #4b0082,
    #ff6f00
  );

  border:4px solid #ff7b00;
  border-radius:20px;

  box-shadow:
    0 0 25px rgba(255,123,0,.7);

  animation:pulse 2s infinite;
}

@keyframes pulse {

  0% {
    box-shadow:
      0 0 15px rgba(255,123,0,.5);
  }

  50% {
    box-shadow:
      0 0 45px rgba(156,39,176,.95);
  }

  100% {
    box-shadow:
      0 0 15px rgba(255,123,0,.5);
  }
}

#title {

  font-size:26px;
  font-weight:bold;

  text-transform:uppercase;

  color:#ffb347;

  text-shadow:
    0 0 8px #ff7b00,
    0 0 15px #9c27b0;
}

#timer {

  font-size:44px;
  font-weight:bold;

  margin:12px 0;

  color:white;

  text-shadow:
    0 0 8px #ff7b00;
}

#subtext {

  font-size:16px;

  color:#ffd180;
}

/* LOGO */
#logo {

  position:absolute;

  bottom:14px;
  right:14px;

  width:70px;

  opacity:.35;
}
</style>
</head>

<body>

<div id="countdown-box">

  <div id="title">
    🎃 Carnival Vista Countdown 🎃
  </div>

  <div id="timer"></div>

  <div id="subtext">
    October 11, 2026 • 11:00 AM
  </div>

  <img id="logo" src="vista-logo.png">

</div>

<script>

const target =
new Date("October 11, 2026 11:00:00").getTime();

function update(){

  const now = new Date().getTime();

  const d = target - now;

  if(d <= 0){

    document.getElementById("timer").innerHTML =
    "🚢 BON VOYAGE!";

    return;
  }

  const days =
  Math.floor(d/(1000*60*60*24));

  const hours =
  Math.floor(
    (d%(1000*60*60*24))
    /(1000*60*60)
  );

  const mins =
  Math.floor(
    (d%(1000*60*60))
    /(1000*60)
  );

  const secs =
  Math.floor(
    (d%(1000*60))
    /1000
  );

  document.getElementById("timer").innerHTML =
  `${days}d ${hours}h ${mins}m ${secs}s`;
}

update();
setInterval(update,1000);

</script>

</body>
</html>
