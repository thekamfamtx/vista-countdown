<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carnival Vista Countdown</title>

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* WIDE BANNER */
#countdown-box{

    position:fixed;

    top:30px;
    right:30px;

    width:800px;
    height:100px;

    padding:15px 25px;

    box-sizing:border-box;

    display:flex;
    align-items:center;
    justify-content:space-between;

    color:white;

    background:linear-gradient(
        135deg,
        #120018,
        #4b0082,
        #ff6f00
    );

    border:4px solid #ff7b00;

    border-radius:20px;

    box-shadow:
        0 0 15px rgba(255,123,0,.6);

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        box-shadow:
        0 0 15px rgba(255,123,0,.5);
    }

    50%{
        box-shadow:
        0 0 40px rgba(156,39,176,.95);
    }

    100%{
        box-shadow:
        0 0 15px rgba(255,123,0,.5);
    }
}

#left{

    display:flex;
    flex-direction:column;
    justify-content:center;
}

#title{

    font-size:24px;
    font-weight:bold;

    text-transform:uppercase;

    color:#ffb347;

    text-shadow:
        0 0 8px #ff7b00,
        0 0 15px #9c27b0;
}

#subtext{

    font-size:14px;

    color:#ffd180;

    margin-top:4px;
}

#timer{

    font-size:44px;
    font-weight:bold;

    white-space:nowrap;

    text-shadow:
        0 0 10px #ff7b00;
}

#logo{

    width:60px;

    opacity:.35;
}

</style>
</head>

<body>

<div id="countdown-box">

    <div id="left">

        <div id="title">
            🎃 Carnival Vista Countdown 🎃
        </div>

        <div id="subtext">
            October 11, 2026 • 11:00 AM
        </div>

    </div>

    <div id="timer">
        Loading...
    </div>

    <img id="logo" src="vista-logo.png">

</div>

<script>

const target =
new Date("October 11, 2026 11:00:00").getTime();

function update(){

    const now =
    new Date().getTime();

    const distance =
    target - now;

    if(distance <= 0){

        document.getElementById("timer").innerHTML =
        "🚢 BON VOYAGE!";

        return;
    }

    const days =
    Math.floor(distance / (1000*60*60*24));

    const hours =
    Math.floor(
        (distance % (1000*60*60*24))
        / (1000*60*60)
    );

    const mins =
    Math.floor(
        (distance % (1000*60*60))
        / (1000*60)
    );

    const secs =
    Math.floor(
        (distance % (1000*60))
        / 1000
    );

    document.getElementById("timer").innerHTML =
    `${days}d ${hours}h ${mins}m ${secs}s`;
}

update();
setInterval(update,1000);

</script>

</body>
</html>
