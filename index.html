<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Halloween Cruise Countdown</title>

<style>
    body {
        margin: 0;
        background: transparent;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    .widget {
        width: 520px;
        padding: 22px;
        border-radius: 18px;

        /* Halloween vibe background */
        background: linear-gradient(135deg, #1a001f, #0b0b0b);
        border: 2px solid #ff7a00;

        box-shadow: 0 0 25px rgba(255, 122, 0, 0.35),
                    0 0 35px rgba(128, 0, 255, 0.25);

        position: relative;
    }

    /* TOP TITLE */
    .title {
        font-size: 20px;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;

        color: #ff7a00;
        text-shadow: 0 0 10px #ff7a00, 0 0 15px #8000ff;

        margin-bottom: 10px;
    }

    /* COUNTDOWN BIG */
    .countdown {
        font-size: 46px;
        font-weight: 900;
        letter-spacing: 1px;

        color: #ffffff;
        text-shadow: 0 0 10px #8000ff, 0 0 20px #ff7a00;

        margin: 18px 0;
    }

    /* BOTTOM DATE */
    .date {
        font-size: 16px;
        opacity: 0.9;
        color: #ffb366;
        text-shadow: 0 0 8px rgba(255, 122, 0, 0.5);
        margin-top: 10px;
    }

    /* OPTIONAL LOGO */
    .logo {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 50px;
        height: 50px;
        object-fit: contain;
        filter: drop-shadow(0 0 6px #ff7a00);
    }
</style>
</head>

<body>

<div class="widget">

    <!-- OPTIONAL LOGO -->
    <!-- <img class="logo" src="logo.png" alt="logo"> -->

    <div class="title">🎃 Carnival Vista Countdown 👻</div>

    <div class="countdown" id="countdown">Loading...</div>

    <div class="date">October 11, 2026</div>

</div>

<script>
    const cruiseDate = new Date("October 11, 2026 11:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = cruiseDate - now;

        if (distance <= 0) {
            document.getElementById("countdown").innerHTML = "🎃 IT'S CRUISE DAY! 👻";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("countdown").innerHTML =
            `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
